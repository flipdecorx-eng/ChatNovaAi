<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ChatNova AI Luxury</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
display:flex;
height:100vh;
background:#f5f5f5;
}

.sidebar{
width:260px;
background:white;
border-right:1px solid #ddd;
padding:20px;
}

.logo{
font-size:28px;
font-weight:bold;
margin-bottom:30px;
}

.menu-item{
padding:15px;
margin-bottom:10px;
background:#f0f0f0;
border-radius:12px;
font-size:18px;
}

.main{
flex:1;
display:flex;
flex-direction:column;
}

.header{
padding:25px;
background:white;
border-bottom:1px solid #ddd;
font-size:35px;
font-weight:bold;
text-align:center;
}

.chat-area{
flex:1;
padding:20px;
overflow-y:auto;
}

.bot{
background:white;
padding:20px;
border-radius:15px;
margin-bottom:15px;
font-size:20px;
}

.input-area{
display:flex;
gap:10px;
padding:15px;
background:white;
border-top:1px solid #ddd;
}

input{
flex:1;
padding:15px;
font-size:18px;
border-radius:30px;
border:1px solid #ccc;
}

button{
padding:15px 25px;
border:none;
border-radius:30px;
background:#2196F3;
color:white;
font-size:18px;
}

.upload{
background:#4CAF50;
}
</style>
</head>

<body>

<div class="sidebar">
<div class="logo">🤖 ChatNova AI</div>

<div class="menu-item">📚 Library</div>
<div class="menu-item">📁 Projects</div>
<div class="menu-item">📅 Schedule</div>
<div class="menu-item">💻 Learn Coding</div>
</div>

<div class="main">

<div class="header">
🤖 ChatNova AI Luxury
</div>

<div class="chat-area" id="chat">
<div class="bot">
Hello Ayush! Welcome to ChatNova AI Luxury 🚀
</div>
</div>

<div class="input-area">
<button class="upload">📷 Upload</button>
<input type="text" placeholder="Ask ChatNova AI...">
<button>Send</button>
</div>

</div>

</body>
</html>
