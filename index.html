<!DOCTYPE html><html>
<head>
<title>ChatNova AI</title>
<style>
body{
background:#202123;
color:white;
font-family:Arial,sans-serif;
margin:0;
}.header{
background:#343541;
padding:20px;
text-align:center;
font-size:30px;
font-weight:bold;
}

.chat{
padding:20px;
max-width:800px;
margin:auto;
}

.message{
background:#444654;
padding:15px;
border-radius:10px;
margin-top:20px;
}

.input-area{
text-align:center;
padding:20px;
}

input{
width:70%;
padding:10px;
border-radius:8px;
border:none;
}

button{
padding:10px 20px;
border:none;
border-radius:8px;
}

.footer{
text-align:center;
padding:20px;
}
</style>

</head>
<body><div class="header">
🤖 ChatNova AI
</div><div class="chat">
<div class="message">
Hello! I am ChatNova AI. How can I help you today?
</div>
</div><div class="input-area">
<input type="text" placeholder="Type your message...">
<button>Send</button>
</div><div class="footer">
Created by Ayush 🚀
</div></body>
</html>
