<!DOCTYPE html>
<html>
<head>
<title>ChatNova AI</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:white;
height:100vh;
display:flex;
flex-direction:column;
}

.topbar{
display:flex;
justify-content:space-between;
padding:20px;
font-size:30px;
background:white;
}

.logo{
text-align:center;
margin-top:20px;
font-size:42px;
font-weight:bold;
color:black;
}

.welcome{
text-align:center;
margin-top:15px;
font-size:22px;
color:#666;
}

.chat-area{
flex:1;
}

.input-area{
padding:15px;
display:flex;
gap:10px;
background:white;
border-top:1px solid #ddd;
}

input{
flex:1;
padding:18px;
font-size:20px;
border-radius:30px;
border:1px solid #ddd;
}

button{
padding:18px 25px;
border:none;
border-radius:30px;
background:#0b93f6;
color:white;
font-size:18px;
}

.footer{
text-align:center;
padding:10px;
color:#777;
font-size:14px;
}
</style>

</head>
<body>

<div class="topbar">
<div>☰</div>
<div>⚙️</div>
</div>

<div class="logo">
ChatNova AI
</div>

<div class="welcome">
Hello! I am ChatNova AI.<br>
How can I help you today?
</div>

<div class="chat-area"></div>

<div class="input-area">
<input type="text" placeholder="Ask ChatNova AI...">
<button>Send</button>
</div>

<div class="footer">
Created by Ayush 🚀
</div>

</body>
</html>
