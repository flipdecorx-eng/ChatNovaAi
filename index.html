<style>
body{
margin:0;
background:white;
font-family:Arial,sans-serif;
}

.top-bar{
display:flex;
justify-content:space-between;
padding:25px;
}

.circle-btn{
width:55px;
height:55px;
border:none;
border-radius:50%;
background:white;
box-shadow:0 4px 15px rgba(0,0,0,.1);
font-size:24px;
}

.main-area{
height:70vh;
}

.chat-bar{
position:fixed;
bottom:20px;
left:20px;
right:20px;
background:white;
border-radius:40px;
padding:10px;
display:flex;
align-items:center;
gap:10px;
box-shadow:0 8px 25px rgba(0,0,0,.1);
}

.chat-bar input{
flex:1;
border:none;
outline:none;
font-size:18px;
}

.icon-btn{
border:none;
background:none;
font-size:28px;
cursor:pointer;
}

.voice-btn{
width:50px;
height:50px;
border:none;
border-radius:50%;
background:#7c3aed;
color:white;
font-size:22px;
}

#plusMenu{
display:none;
position:fixed;
bottom:90px;
left:25px;
background:white;
padding:10px;
border-radius:20px;
box-shadow:0 4px 15px rgba(0,0,0,.1);
}

#plusMenu button{
display:block;
width:100%;
margin:5px 0;
padding:10px;
border:none;
background:#f3f4f6;
border-radius:10px;
}
</style><div class="top-bar">
<button class="circle-btn">☰</button>
<button class="circle-btn">💬</button>
</div><div class="main-area"></div><div id="plusMenu">
<button>📷 Camera</button>
<button>🖼️ Upload Photo</button>
<button>📁 Upload File</button>
<button>🎨 Create Image</button>
</div><div class="chat-bar">
<button class="icon-btn" onclick="toggleMenu()">➕</button><input type="text" placeholder="Ask ChatNova AI"><button class="icon-btn">🎤</button>

<button class="voice-btn">🎵</button>

</div><script>
function toggleMenu(){
let menu=document.getElementById("plusMenu");

if(menu.style.display==="block"){
menu.style.display="none";
}else{
menu.style.display="block";
}
}
</script>
