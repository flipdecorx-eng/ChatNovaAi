<!DOCTYPE html><html>
<head>
<title>ChatNova AI</title><style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:white;
height:100vh;
display:flex;
flex-direction:column;
}

.topbar{
padding:25px;
font-size:60px;
}

.logo{
text-align:center;
margin-top:60px;
font-size:100px;
font-weight:bold;
color:black;
}

.welcome{
text-align:center;
margin-top:25px;
font-size:50px;
color:#666;
}

.chat-area{
flex:1;
}

.input-area{
padding:20px;
display:flex;
gap:15px;
background:white;
border-top:1px solid #ddd;
}

input{
flex:1;
padding:35px;
font-size:36px;
border:1px solid #ddd;

}

button{
padding:35px 45px;
background:#0b93f6;
color:white;
border:none;
border-radius:40px;

}

.footer{
text-align:center;
padding:15px;
font-size:24px;
color:#777;
}
</style></head><body><div class="topbar">
☰
</div><div class="logo">
🤖 ChatNova AI
</div><div class="welcome">

How can I help you today?
</div><div class="chat-area"></div><div class="input-area">
<input type="text" placeholder="Ask ChatNova AI...">
<button>Send</button>
</div><div class="footer">
Created by Ayush 🚀
</div></body>
</html>
