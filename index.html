<!DOCTYPE html>
<html>
<head>
<title>ChatNova AI</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#212121;
color:white;
height:100vh;
display:flex;
flex-direction:column;
}

.header{
padding:20px;
text-align:center;
font-size:32px;
font-weight:bold;
border-bottom:1px solid #444;
background:#202123;
}

.chat-area{
flex:1;
overflow-y:auto;
padding:20px;
}

.ai-message{
background:#2f2f2f;
padding:18px;
border-radius:12px;
max-width:900px;
margin:20px auto;
font-size:22px;
}

.input-area{
padding:20px;
background:#202123;
border-top:1px solid #444;
display:flex;
justify-content:center;
gap:10px;
}

input{
width:80%;
max-width:900px;
padding:18px;
font-size:20px;
border:none;
border-radius:12px;
}

button{
padding:18px 25px;
font-size:20px;
border:none;
border-radius:12px;
cursor:pointer;
}

.footer{
text-align:center;
padding:10px;
font-size:14px;
color:#aaa;
}
</style>
</head>

<body>

<div class="header">
🤖 ChatNova AI
</div>

<div class="chat-area">
<div class="ai-message">
Hello! I am ChatNova AI. How can I help you today?
</div>
</div>

<div class="input-area">
<input type="text" placeholder="Message ChatNova AI...">
<button>Send</button>
</div>

<div class="footer">
Created by Ayush 🚀
</div>

</body>
</html>
