<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatNova AI</title><style>
body{
margin:0;
background:#f5f5f5;
font-family:Arial,sans-serif;
height:100vh;
}

.top-bar{
display:flex;
justify-content:space-between;
padding:20px;
}

.circle-btn{
width:73px;
height:73px;
border:none;
border-radius:50%;
background:white;
font-size:34px;
box-shadow:0 4px 15px rgba(0,0,0,.1);
}

.main-area{
height:75vh;
}

.chat-bar{
position:fixed;
bottom:20px;
left:20px;
right:20px;
height:80px;
background:white;
border-radius:40px;
padding:0 20px;
display:flex;
align-items:center;
gap:15px;
box-shadow:0 8px 25px rgba(0,0,0,.1);
}

.icon-btn{
border:none;
background:none;
font-size:23px;
cursor:pointer;
}

.chat-bar input{
flex:1;
border:none;
outline:none;
font-size:17px;
background:transparent;
}

.voice-btn{
width:54px;
height:54px;
border:none;
border-radius:50%;
background:#7c3aed;
color:white;
font-size:22px;
cursor:pointer;
}

#plusMenu{
display:none;
position:fixed;
bottom:110px;
left:19px;
background:white;
padding:9px;
border-radius:15px;
box-shadow:0 4px 15px rgba(0,0,0,.15);
}

#plusMenu button{
display:block;
width:217px;
padding:15px;
margin:5px 0;
border:none;
border-radius:10px;
font-size:17px;
cursor:pointer;
}
</style></head><body><div class="top-bar">
<button class="circle-btn">☰</button>
<button class="circle-btn">💬</button>
</div><div class="main-area"></div><div id="plusMenu">
<button> Camera</button>
<button> Upload Photo</button>
<button> Upload File</button>
<button> Create Image</button>
</div><div class="chat-bar">
<button class="icon-btn" onclick="toggleMenu()">➕</button><input type="text" placeholder="Ask ChatNova AI"><button class="icon-btn"></button>

<button class="sent">📩</button>

</div><script>
function toggleMenu(){
let menu=document.getElementById("plusMenu");
menu.style.display =
menu.style.display==="block" ? "none" : "block";
}
</script></body>
</html>
