<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatNova AI</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,Helvetica,sans-serif;
    }

    body{
      display:flex;
      height:100vh;
      background:#f4f0ff;
      overflow:hidden;
    }

    /* Sidebar */

    .sidebar{
      width:260px;
      background:#6d28d9;
      color:white;
      display:flex;
      flex-direction:column;
      transition:.3s;
    }

    .logo{
      padding:20px;
      font-size:24px;
      font-weight:bold;
      border-bottom:1px solid rgba(255,255,255,.2);
    }

    .menu{
      padding:15px;
    }

    .menu div{
      padding:12px;
      border-radius:8px;
      cursor:pointer;
      margin-bottom:10px;
      transition:.2s;
    }

    .menu div:hover{
      background:#7c3aed;
    }

    /* Main */

    .main{
      flex:1;
      display:flex;
      flex-direction:column;
    }

    .topbar{
      height:60px;
      background:white;
      display:flex;
      align-items:center;
      padding:0 20px;
      box-shadow:0 2px 8px rgba(0,0,0,.08);
    }

    #menuBtn{
      font-size:24px;
      cursor:pointer;
      display:none;
      margin-right:15px;
    }

    .title{
      font-size:22px;
      font-weight:bold;
      color:#6d28d9;
    }

    .chat{
      flex:1;
      overflow-y:auto;
      padding:20px;
      display:flex;
      flex-direction:column;
      gap:15px;
    }

    .welcome{
      margin:auto;
      text-align:center;
    }

    .welcome h1{
      color:#6d28d9;
      margin-bottom:10px;
    }

    .user{
      align-self:flex-end;
      background:#6d28d9;
      color:white;
      padding:12px 15px;
      border-radius:15px 15px 0 15px;
      max-width:80%;
    }

    .bot{
      align-self:flex-start;
      background:white;
      padding:12px 15px;
      border-radius:15px 15px 15px 0;
      box-shadow:0 2px 8px rgba(0,0,0,.1);
      max-width:80%;
    }

    .bottom{
      padding:15px;
      background:white;
      display:flex;
      gap:10px;
      box-shadow:0 -2px 8px rgba(0,0,0,.08);
    }

    #message{
      flex:1;
      padding:12px;
      border:2px solid #ddd;
      border-radius:25px;
      outline:none;
      font-size:16px;
    }

    #sendBtn{
      background:#6d28d9;
      color:white;
      border:none;
      width:55px;
      border-radius:50%;
      cursor:pointer;
      font-size:20px;
    }

    #sendBtn:hover{
      background:#5b21b6;
    }

    @media(max-width:768px){

      .sidebar{
        position:absolute;
        left:-260px;
        top:0;
        height:100%;
      }

      .sidebar.active{
        left:0;
      }

      #menuBtn{
        display:block;
      }

    }
  </style>
</head>

<body>

<div class="sidebar" id="sidebar">

<div class="logo">
✨ ChatNova AI
</div>

<div class="menu">
<div>🏠 Home</div>
<div>💻 Coding</div>
<div>🤖 AI</div>
<div>📚 Library</div>
<div>⚙ Settings</div>
</div>

</div>

<div class="main">

<div class="topbar">
<div id="menuBtn">☰</div>
<div class="title">ChatNova AI</div>
</div>

<div class="chat" id="chat">

<div class="welcome">
<h1>Hello Ayush 👋</h1>
<p>Welcome to ChatNova AI</p>
</div>

<div class="bottom">

<input
id="message"
type="text"
placeholder="Message ChatNova AI..."
autocomplete="off">

<button id="sendBtn">➤</button>

</div>

</div>

<script>

const sidebar=document.getElementById("sidebar");
const menuBtn=document.getElementById("menuBtn");
const sendBtn=document.getElementById("sendBtn");
const message=document.getElementById("message");
const chat=document.getElementById("chat");

menuBtn.onclick=()=>{
sidebar.classList.toggle("active");
};

async function sendMessage(){

const text=message.value.trim();

if(!text)return;

document.querySelector(".welcome")?.remove();

chat.innerHTML+=`
<div class="user">${text}</div>
`;

message.value="";

chat.innerHTML+=`
<div class="bot" id="thinking">
Thinking...
</div>
`;

chat.scrollTop=chat.scrollHeight;

try{

const response=await fetch("https://calm-rice-33af.flipdecorx.workers.dev",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
message:text
})

});

const data=await response.json();

document.getElementById("thinking").remove();

chat.innerHTML+=`
<div class="bot">
${data.reply||"No response"}
</div>
`;

}catch(e){

document.getElementById("thinking").innerHTML=
"❌ "+e.message;

}

chat.scrollTop=chat.scrollHeight;

}

sendBtn.onclick=sendMessage;

message.addEventListener("keydown",e=>{

if(e.key==="Enter"){
sendMessage();
}

});
</script>

</body>

</html>
