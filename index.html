<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ChatNova AI</title><style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
display:flex;
height:100vh;
background:#f7f7f7;
}

.sidebar{
width:250px;
background:white;
border-right:1px solid #ddd;
padding:20px;
}

.logo{
font-size:28px;
font-weight:bold;
margin-bottom:30px;
}

.menu{
padding:15px;
margin-bottom:10px;
background:#f1f1f1;
border-radius:12px;
}

.main{
flex:1;
display:flex;
flex-direction:column;
}

.header{
padding:20px;
background:white;
border-bottom:1px solid #ddd;
font-size:36px;
font-weight:bold;
text-align:center;
}

.chat{
flex:1;
padding:20px;
overflow:auto;
}

.bot{
background:white;
padding:20px;
border-radius:15px;
font-size:20px;
margin-bottom:15px;
}

.input-area{
display:flex;
gap:10px;
padding:15px;
background:white;
border-top:1px solid #ddd;
}

.upload{
background:#4CAF50;
color:white;
border:none;
padding:15px;
border-radius:12px;
}

input{
flex:1;
padding:15px;
font-size:18px;
border-radius:12px;
border:1px solid #ccc;
}

button{
padding:15px 25px;
background:#2196F3;
color:white;
border:none;
border-radius:12px;
}
</style></head><body><div class="sidebar">
<div class="logo">🤖 ChatNova AI</div><div class="menu">📚 Library</div>
<div class="menu">📁 Projects</div>
<div class="menu">📅 Schedule</div>
<div class="menu">💻 Learn Coding</div>
</div><div class="main"><div class="header">
ChatNova AI Luxury
</div><div class="chat" id="chat">
<div class="bot">
Hello Ayush! Welcome to ChatNova AI 🚀
</div>
</div><div class="input-area">
<button class="upload">📷 Upload</button>
<input type="text" id="msg" placeholder="Ask ChatNova AI...">
<button onclick="sendMessage()">Send</button>
</div></div><script>
function sendMessage(){
let text=document.getElementById("msg").value;
if(text=="") return;

let chat=document.getElementById("chat");

chat.innerHTML += '<div style="background:#2196F3;color:white;padding:15px;border-radius:15px;margin:10px;text-align:right;">'+text+'</div>';

chat.innerHTML += '<div class="bot">I am ChatNova AI 🤖. Real AI answers will be added later.</div>';

document.getElementById("msg").value="";
}
</script></body>
</html>
