<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatNova AI</title><style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
height:100vh;
overflow:hidden;
}

.top-bar{
display:flex;
justify-content:space-between;
padding:25px;
}

.circle-btn{
width:73px;
height:73px;
border:none;
border-radius:50%;
background:white;
font-size:34px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
cursor:pointer;
}

.main-area{
height:75vh;
}

.chat-bar{
position:fixed;
bottom:25px;
left:15px;
right:15px;
background:white;
border-radius:50px;
padding:15px;
display:flex;
align-items:center;
gap:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.chat-bar input{
flex:1;
border:none;
outline:none;
font-size:24px;
background:transparent;
}

.icon-btn{
border:none;
background:none;
font-size:39px;
cursor:pointer;
}

.send-btn{
background:#7c3aed;
color:white;
border:none;
padding:15px 25px;
border-radius:20px;
font-size:21px;
font-weight:bold;
cursor:pointer;
}

#plusMenu{
display:none;
position:fixed;
bottom:120px;
left:20px;
background:white;
border-radius:15px;
padding:10px;
box-shadow:0 4px 15px rgba(0,0,0,0.15);
}

#plusMenu button{
display:block;
width:218px;
padding:15px;
margin:5px 0;
border:none;
border-radius:10px;
cursor:pointer;
font-size:20px;
}
</style></head><body><div class="top-bar">
<button class="circle-btn">☰</button>
<button class="circle-btn">💬</button>
</div><div class="main-area"></div><div id="plusMenu">
<button>📷 Camera</button>
<button>🖼️ Upload Photo</button>
<button>📁 Upload File</button>
<button>🎨 Create Image</button>
</div><div class="chat-bar"><button class="icon-btn" onclick="toggleMenu()">➕</button>

<input type="text" placeholder="Ask ChatNova AI"><button class="icon-btn">🎤</button>

<button class="send-btn">Send</button>

</div><script>
function toggleMenu(){
const menu=document.getElementById("plusMenu");

if(menu.style.display==="block"){
menu.style.display="none";
}else{
menu.style.display="block";
}
}
</script></body>
</html>
