<!DOCTYPE html><html>
<head>
<title>ChatNova AI</title><style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:white;
height:100vh;
display:flex;
flex-direction:column;
}

.topbar{
padding:15px;
font-size:28px;
}

.logo{
text-align:center;
margin-top:30px;
font-size:40px;
font-weight:bold;
color:black;
}

.welcome{
text-align:center;
margin-top:15px;
font-size:22px;
color:#666;
}

.chat-area{
flex:1;
}

.input-area{
padding:15px;
display:flex;
gap:10px;
border-top:1px solid #ddd;
background:white;
}

input{
flex:1;
padding:16px;
font-size:18px;
border:1px solid #ddd;
border-radius:25px;
}

button{
padding:16px 22px;
background:#0b93f6;
color:white;
border:none;
border-radius:25px;
font-size:18px;
}

.footer{
text-align:center;
padding:10px;
color:#777;
font-size:14px;
}
</style></head><body><div class="topbar">☰</div><div class="logo">
🤖 ChatNova AI
</div><div class="welcome">
Hello! I am ChatNova AI.<br>
How can I help you today?
</div><div class="chat-area"></div><div class="input-area">
<input type="text" placeholder="Message ChatNova AI...">
<button>Send</button>
</div><div class="footer">
Created by Ayush 🚀
</div></body>
</html>
