<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatNova AI</title><style>
body{
margin:0;
background:#f5f5f5;
font-family:Arial,sans-serif;
height:100vh;
}

.top-bar{
display:flex;
justify-content:space-between;
padding:20px;
}

.circle-btn{
width:73px;
height:73px;
border:none;
border-radius:50%;
background:white;
font-size:34px;
box-shadow:0 4px 15px rgba(0,0,0,.1);
}

.main-area{
height:70vh;
}

.chat-bar{
position:fixed;
bottom:20px;
left:15px;
right:15px;
background:white;
border-radius:50px;
padding:15px;
display:flex;
align-items:center;
gap:10px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
}

.icon-btn{
border:none;
background:none;
font-size:39px;
}

.chat-bar input{
flex:1;
border:none;
outline:none;
font-size:24px;
background:transparent;
}

.voice-btn{
width:70px;
height:70px;
border:none;
border-radius:50%;
background:#7c3aed;
color:white;
font-size:30px;
}

#plusMenu{
display:none;
position:fixed;
bottom:120px;
left:20px;
background:white;
padding:10px;
border-radius:15px;
box-shadow:0 4px 15px rgba(0,0,0,.15);
}

#plusMenu button{
display:block;
width:218px;
padding:15px;
margin:5px 0;
border:none;
border-radius:10px;
font-size:20px;
}
</style></head><body><div class="top-bar">
<button class="circle-btn">☰</button>
<button class="circle-btn">💬</button>
</div><div class="main-area"></div><div id="plusMenu">
<button>📷 Camera</button>
<button>🖼️ Upload Photo</button>
<button>📁 Upload File</button>
<button>🎨 Create Image</button>
</div><div class="chat-bar">
<button class="icon-btn" onclick="toggleMenu()">➕</button><input type="text" placeholder="Ask ChatNova AI"><button class="icon-btn">🎤</button>

<button class="voice-btn">➤</button>

</div><script>
function toggleMenu(){
let menu=document.getElementById("plusMenu");
menu.style.display =
menu.style.display==="block" ? "none" : "block";
}
</script></body>
</html>
