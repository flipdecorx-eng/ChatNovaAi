<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatNova AI</title>
    <style>
        /* --- Purple Theme Variables --- */
        :root {
            --primary: #7e22ce;       /* Main Purple */
            --primary-light: #a855f7; /* Light Purple */
            --primary-dark: #581c87;  /* Dark Purple */
            --bg-main: #fbfbfe;       /* Main Chat Background */
            --bg-sidebar: #f3e8ff;    /* Light Purple Sidebar */
            --bg-panel: #ffffff;      /* Pure White Panels */
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border: #e9d5ff;
            --shadow: rgba(126, 34, 206, 0.12);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            display: flex;
            height: 100vh;
            width: 100vw;
            background-color: var(--bg-main);
            color: var(--text-main);
            overflow: hidden;
        }

        /* --- Sidebar (Side Menu) --- */
        .sidebar {
            width: 260px;
            min-width: 260px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
            z-index: 100;
        }

        /* Class to collapse sidebar on desktop/mobile */
        .sidebar.collapsed {
            margin-left: -260px;
        }

        .sidebar-header {
            padding: 20px;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--primary-dark);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .menu-items {
            list-style: none;
            padding: 15px;
            flex-grow: 1;
            overflow-y: auto;
        }

        .menu-items li {
            padding: 12px 15px;
            margin-bottom: 8px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
            color: var(--text-main);
        }

        .menu-items li:hover {
            background-color: var(--primary);
            color: white;
        }

        /* --- Main Chat Workspace --- */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
            overflow: hidden;
        }

        /* Persistent Header for Top Actions */
        .app-header {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            background-color: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            gap: 15px;
        }

        .menu-btn {
            background: var(--bg-sidebar);
            border: 1px solid var(--border);
            font-size: 1.3rem;
            color: var(--primary);
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 8px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .menu-btn:hover {
            background-color: var(--primary);
            color: white;
        }

        .app-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--primary-dark);
        }

        /* --- Chat Stream Display --- */
        .chat-display {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .welcome-container {
            text-align: center;
            margin: auto;
            max-width: 500px;
            padding: 20px;
        }

        .welcome-container h1 {
            color: var(--primary);
            margin-bottom: 12px;
            font-size: 2.3rem;
        }

        .welcome-container p {
            color: var(--text-muted);
            font-size: 1.05rem;
        }

        /* Chat Bubbles */
        .message {
            max-width: 75%;
            padding: 14px 18px;
            border-radius: 18px;
            font-size: 1rem;
            line-height: 1.5;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background-color: var(--primary);
            color: white;
            border-radius: 18px 18px 0 18px;
            box-shadow: 0 4px 10px var(--shadow);
        }

        .message.assistant {
            align-self: flex-start;
            background-color: var(--bg-panel);
            color: var(--text-main);
            border-radius: 18px 18px 18px 0;
            border: 1px solid var(--border);
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        /* --- Input Action Center --- */
        .input-area-wrapper {
            padding: 20px;
            background-color: var(--bg-panel);
            border-top: 1px solid var(--border);
            position: relative;
        }

        .input-box-container {
            display: flex;
            align-items: center;
            background-color: var(--bg-main);
            border: 2px solid var(--border);
            border-radius: 30px;
            padding: 6px 12px;
            transition: all 0.2s ease;
        }

        .input-box-container:focus-within {
            border-color: var(--primary-light);
            background-color: #fff;
            box-shadow: 0 0 12px var(--shadow);
        }

        .action-btn {
            background: none;
            border: none;
            font-size: 1.2rem;
            color: var(--text-muted);
            cursor: pointer;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .action-btn:hover {
            background-color: var(--border);
            color: var(--primary-dark);
        }

        .action-btn.send {
            color: var(--primary);
            background-color: var(--bg-sidebar);
        }

        .action-btn.send:hover {
            background-color: var(--primary);
            color: white;
        }

        .chat-input {
            flex-grow: 1;
            border: none;
            outline: none;
            padding: 12px;
            font-size: 1rem;
            background: transparent;
            color: var(--text-main);
        }

        /* --- Floating Upload Overlay Menu --- */
        .upload-popup-menu {
            position: absolute;
            bottom: 85px;
            left: 25px;
            background-color: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 14px;
            box-shadow: 0 12px 24px var(--shadow);
            display: none;
            flex-direction: column;
            width: 180px;
            z-index: 200;
            overflow: hidden;
        }

        .upload-popup-menu.show {
            display: flex;
            animation: popUp 0.2s ease;
        }

        @keyframes popUp {
            from { opacity: 0; transform: translateY(15px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .upload-option {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.2s;
            color: var(--text-main);
        }

        .upload-option:hover {
            background-color: var(--bg-sidebar);
            color: var(--primary-dark);
        }

        /* --- Responsive Screen Dynamics --- */
        @media (max-width: 768px) {
            .sidebar {
                position: absolute;
                top: 0;
                left: 0;
                height: 100%;
            }
            
            /* Overlay shadow background when sidebar is open on mobile */
            body.sidebar-open::after {
                content: '';
                position: fixed;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                background: rgba(0,0,0,0.4);
                z-index: 90;
            }
        }
    </style>
</head>
<body>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span>✨ ChatNova AI</span>
        </div>
        <ul class="menu-items">
            <li onclick="selectMenu('Coding')">💻 Coding</li>
            <li onclick="selectMenu('Schedule')">📅 Schedule</li>
            <li onclick="selectMenu('AI Learning')">🧠 AI Learning</li>
            <li onclick="selectMenu('Library')">📚 Library</li>
            <li onclick="selectMenu('Projects')">📁 Projects</li>
        </ul>
    </aside>

    <main class="main-content">
        <header class="app-header">
            <button class="menu-btn" id="globalMenuToggle" title="Toggle Sidebar">☰</button>
            <div class="app-title" id="dynamicTitle">ChatNova AI</div>
        </header>

        <div class="chat-display" id="chatDisplay">
            <div class="welcome-container" id="welcomeScreen">
                <h1>Hi, I'm ChatNova</h1>
                <p>Your intelligent purple workspace. Ask me anything, structure schedules, or paste code blocks to get started.</p>
            </div>
        </div>

        <div class="input-area-wrapper">
            
            <div class="upload-popup-menu" id="uploadPopupMenu">
                <div class="upload-option" onclick="triggerUpload('Camera')">📷 Camera</div>
                <div class="upload-option" onclick="triggerUpload('Image')">🖼️ Upload Image</div>
                <div class="upload-option" onclick="triggerUpload('File')">📁 File</div>
            </div>

            <div class="input-box-container">
                <button class="action-btn" id="plusMenuBtn" title="Upload Content" type="button">➕</button>
                <input type="text" id="chatInputField" class="chat-input" placeholder="Message ChatNova AI..." autocomplete="off">
                <button class="action-btn" id="micBtn" title="Voice Input" type="button">🎙️</button>
                <button class="action-btn send" id="sendMsgBtn" title="Send Message" type="button">➤</button>
            </div>
        </div>
    </main>

    <script>
        // DOM Elements Configuration
        const sidebar = document.getElementById('sidebar');
        const globalMenuToggle = document.getElementById('globalMenuToggle');
        const plusMenuBtn = document.getElementById('plusMenuBtn');
        const uploadPopupMenu = document.getElementById('uploadPopupMenu');
        const sendMsgBtn = document.getElementById('sendMsgBtn');
        const chatInputField = document.getElementById('chatInputField');
        const chatDisplay = document.getElementById('chatDisplay');
        const welcomeScreen = document.getElementById('welcomeScreen');
        const micBtn = document.getElementById('micBtn');

        // 1. Sidebar Collapse / Expand Functionality (Desktop & Mobile)
        globalMenuToggle.addEventListener('click', (e) => {
            e.stopPropagation();
            sidebar.classList.toggle('collapsed');
            document.body.classList.toggle('sidebar-open');
        });

        // Close sidebar on mobile when clicking the workspace backdrop
        document.addEventListener('click', (e) => {
            if (window.innerWidth <= 768) {
                if (!sidebar.contains(e.target) && !globalMenuToggle.contains(e.target)) {
                    sidebar.classList.add('collapsed');
                    document.body.classList.remove('sidebar-open');
                }
            }
        });

        // 2. ➕ Plus Upload Menu Mechanics
        plusMenuBtn.addEventListener('click', (e) => {
            e.stopPropagation(); // Stop window click from instantly shutting the menu
            uploadPopupMenu.classList.toggle('show');
        });

        // Dismiss upload menu when clicking anywhere else on screen
        document.addEventListener('click', (e) => {
            if (!uploadPopupMenu.contains(e.target) && !plusMenuBtn.contains(e.target)) {
                uploadPopupMenu.classList.remove('show');
            }
        });

        // 3. Execution Logic for Upload Actions
        function triggerUpload(type) {
            uploadPopupMenu.classList.remove('show');
            
            // Render simulated upload systemic response
            hideWelcome();
            appendMessage(`System Action: Activated ${type} pipeline.`, 'assistant');
        }

        // 4. Sidebar Content Categorization Simulation
        function selectMenu(category) {
            document.getElementById('dynamicTitle').innerText = `ChatNova AI — ${category}`;
            hideWelcome();
            appendMessage(`Switched contextual canvas to: **${category}** mode.`, 'assistant');
            
            // Auto collapse sidebar view on mobile after item choice
            if (window.innerWidth <= 768) {
                sidebar.classList.add('collapsed');
                document.body.classList.remove('sidebar-open');
            }
        }

        // 5. Chat Lifecycle Engine (Send & Response)
        function executeUserSend() {
            const queryText = chatInputField.value.trim();
            if (!queryText) return; // Prevent empty transmissions

            hideWelcome();
            
            // Inject User Message Bubble
            appendMessage(queryText, 'user');
            chatInputField.value = ''; // Flush input track

            // Trigger AI Automated Response Generation Routine
            simulateAIResponse(queryText);
        }

        function appendMessage(text, sender) {
            const msgBubble = document.createElement('div');
            msgBubble.classList.add('message', sender);
            msgBubble.innerHTML = text;
            
            chatDisplay.appendChild(msgBubble);
            
            // Enforce automatic scroll-down tracking
            chatDisplay.scrollTop = chatDisplay.scrollHeight;
        }

        function hideWelcome() {
            if (welcomeScreen) {
                welcomeScreen.style.display = 'none';
            }
        }

        function simulateAIResponse(userPrompt) {
            setTimeout(() => {
                let reply = "I process prompts universally. Tell me how to configure your current stack!";
                
                if (userPrompt.toLowerCase().includes('hello') || userPrompt.toLowerCase().includes('hi')) {
                    reply = "Hello! ChatNova AI online. Ready to build software, organize calendars, or parse intelligence tracks.";
                } else {
                    reply = `I am processing your text request: "<em>${userPrompt}</em>". Custom workspace triggers are online.`;
                }
                appendMessage(reply, 'assistant');
            }, 750);
        }

        // Event Attachment Links
        sendMsgBtn.addEventListener('click', executeUserSend);
        
        chatInputField.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                executeUserSend();
            }
        });

        micBtn.addEventListener('click', () => {
            hideWelcome();
            appendMessage("<em>Listening for audio stream input...</em>", 'assistant');
        });
    </script>
</body>
</html>
