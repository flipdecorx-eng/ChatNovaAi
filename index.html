<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChatNova AI</title>
    <style>
        /* --- Purple Theme Variables --- */
        :root {
            --primary: #7e22ce;       /* Main Purple */
            --primary-light: #a855f7; /* Light Purple */
            --primary-dark: #581c87;  /* Dark Purple */
            --bg-main: #fbfbfe;       /* Main Chat Background */
            --bg-sidebar: #f3e8ff;    /* Light Purple Sidebar */
            --bg-panel: #ffffff;      /* Pure White Panels */
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border: #e9d5ff;
            --shadow: rgba(126, 34, 206, 0.12);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        html, body {
            height: 100dvh;
            width: 100vw;
            background-color: var(--bg-main);
            color: var(--text-main);
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            display: flex;

            /* Mobile Chrome ko text automatically bada karne se rokne ke liye */
            -webkit-text-size-adjust: none !important;
            text-size-adjust: none !important;
        }

        /* --- Sidebar (Side Menu) --- */
        .sidebar {
            width: 260px;
            min-width: 260px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .sidebar.collapsed {
            margin-left: -260px;
        }

        .sidebar-header {
            padding: 20px;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--primary-dark);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .menu-items {
            list-style: none;
            padding: 15px;
            flex-grow: 1;
            overflow-y: auto;
        }

        .menu-items li {
            padding: 12px 15px;
            margin-bottom: 8px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
            color: var(--text-main);
        }

        .menu-items li:hover {
            background-color: var(--primary);
            color: white;
        }

        /* --- Main Chat Workspace --- */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            height: 100dvh;
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        /* Persistent Header */
        .app-header {
            display: flex;
            align-items: center;
            padding: 16px 16px 12px 16px !important;
            background-color: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            gap: 15px;
            flex-shrink: 0;
        }

        .menu-btn {
            background: transparent;
            border: none;
            font-size: 18px !important;
            width: 18px !important;
            color: var(--primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .app-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--primary-dark);
        }

        /* --- Chat Stream Display --- */
        .chat-display {
            flex-grow: 1;
            min-height: 0;
            padding: 20px;
            padding-bottom: 120px; /* Space protected for bottom input bar */
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 20px;
        }

        /* ─── 🌟 ULTRA-SLEEK CHHOTA TEXT CONFIGURATION 🌟 ─── */
        .welcome-container {
            text-align: center;
            margin: auto !important;
            width: 260px !important;
            max-width: 260px !important;
            padding: 0px !important;
        }

        .welcome-container h1 {
            color: var(--primary) !important;
            font-size: 18px !important; /* Perfect small dimensions */
            font-weight: 700 !important;
            margin-bottom: 6px !important;
            letter-spacing: -0.3px !important;
        }

        .welcome-container p {
            color: var(--text-muted) !important;
            font-size: 12px !important; /* Tiny premium looking subtitle text */
            line-height: 1.4 !important;
        }

        /* Chat Bubbles */
        .message {
            max-width: 75%;
            padding: 14px 18px;
            border-radius: 18px;
            font-size: 1rem;
            line-height: 1.5;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background-color: var(--primary);
            color: white;
            border-radius: 18px 18px 0 18px;
            box-shadow: 0 4px 10px var(--shadow);
        }

        .message.assistant {
            align-self: flex-start;
            background-color: var(--bg-panel);
            color: var(--text-main);
            border-radius: 18px 18px 18px 0;
            border: 1px solid var(--border);
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        /* ─── 🌟 FIXED INPUT BOX & RIGHT ICONS ALIGNMENT 🌟 ─── */
        .input-area-wrapper {
            position: absolute !important;
            bottom: 0 !important;
            left: 0 !important;
            width: 100% !important;
            padding: 12px 16px !important;
            padding-bottom: 24px !important; /* Screen floor margin */
            background-color: var(--bg-main) !important;
            z-index: 999 !important;
        }

        .input-box-container {
            display: flex;
            align-items: center;
            justify-content: space-between !important;
            background-color: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 6px 14px !important;
            box-shadow: 0 4px 12px rgba(126, 34, 206, 0.05);
            gap: 8px;
        }

        .chat-input {
            flex-grow: 1;
            border: none;
            outline: none;
            padding: 6px 4px;
            font-size: 14px;
            background: transparent;
            color: var(--text-main);
        }

        /* Right Side Actions wrapper to prevent button layout overflow */
        .input-actions-right {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
            padding-right: 2px;
        }

        .action-btn {
            background: none;
            border: none;
            font-size: 1.1rem;
            color: var(--text-muted);
            cursor: pointer;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .action-btn:hover {
            background-color: var(--border);
            color: var(--primary-dark);
        }

        .action-btn.send {
            color: var(--primary) !important;
            font-size: 1.2rem !important;
            background-color: transparent !important;
            width: auto;
            height: auto;
        }

        /* --- Floating Upload Overlay Menu --- */
        .upload-popup-menu {
            position: absolute;
            bottom: 85px;
            left: 25px;
            background-color: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 14px;
            box-shadow: 0 12px 24px var(--shadow);
            display: none;
            flex-direction: column;
            width: 180px;
            z-index: 200;
            overflow: hidden;
        }

        .upload-popup-menu.show {
            display: flex;
            animation: popUp 0.2s ease;
        }

        @keyframes popUp {
            from { opacity: 0; transform: translateY(15px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .upload-option {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.2s;
            color: var(--text-main);
        }

        .upload-option:hover {
            background-color: var(--bg-sidebar);
            color: var(--primary-dark);
        }

        /* --- Responsive Screen Dynamics --- */
        @media (max-width: 768px) {
            .sidebar {
                position: absolute;
                top: 0;
                left: 0;
                height: 100%;
            }

            body.sidebar-open::after {
                content: '';
                position: fixed;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                background: rgba(0,0,0,0.4);
                z-index: 90;
            }
        }

        /* Large Computer Monitors Reset Scaling */
        @media (min-width: 769px) {
            .welcome-container {
                max-width: 500px;
                width: auto !important;
            }
            .welcome-container h1 {
                font-size: 36px !important;
                margin-bottom: 12px !important;
            }
            .welcome-container p {
                font-size: 16px !important;
            }
            .input-area-wrapper {
                position: relative;
                padding: 20px !important;
            }
            .chat-display {
                padding-bottom: 20px;
            }
        }
    </style>
</head>
<body>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span>✨ ChatNova AI</span>
        </div>
        <ul class="menu-items">
            <li onclick="selectMenu('Coding')">💻 Coding</li>
            <li onclick="selectMenu('Schedule')">📅 Schedule</li>
            <li onclick="selectMenu('AI Learning')">🧠 AI Learning</li>
            <li onclick="selectMenu('Library')">📚 Library</li>
            <li onclick="selectMenu('Projects')">📁 Projects</li>
        </ul>
    </aside>

    <div class="main-content">
        <header class="app-header">
            <button class="menu-btn" id="globalMenuToggle" title="Toggle Sidebar">☰</button>
            <div class="app-title" id="dynamicTitle">ChatNova AI</div>
        </header>

        <div class="chat-display" id="chatDisplay">
            <div class="welcome-container" id="welcomeScreen">
                <h1>Hi, I'm ChatNova AI</h1>
                <p>How do I help you</p>
            </div>
        </div>

        <div class="input-area-wrapper">

            <div class="upload-popup-menu" id="uploadPopupMenu">
                <div class="upload-option" onclick="triggerUpload('Camera')">📷 Camera</div>
                <div class="upload-option" onclick="triggerUpload('Image')">🖼️ Upload Image</div>
                <div class="upload-option" onclick="triggerUpload('File')">📁 File</div>
            </div>

            <div class="input-box-container">
                <button class="action-btn" id="plusMenuBtn" title="Upload Content" type="button">➕</button>
                <input type="text" id="chatInputField" class="chat-input" placeholder="Message ChatNova AI..." autocomplete="off">
                
                <!-- Right Side Actions Group to stop layout shifting -->
                <div class="input-actions-right">
                    <button class="action-btn" id="micBtn" title="Voice Input" type="button">🎙️</button>
                    <button class="action-btn send" id="sendMsgBtn" title="Send Message" type="button">➤</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const sidebar = document.getElementById('sidebar');
        const globalMenuToggle = document.getElementById('globalMenuToggle');
        const plusMenuBtn = document.getElementById('plusMenuBtn');
        const uploadPopupMenu = document.getElementById('uploadPopupMenu');
        const sendMsgBtn = document.getElementById('sendMsgBtn');
        const chatInputField = document.getElementById('chatInputField');
        const chatDisplay = document.getElementById('chatDisplay');
        const welcomeScreen = document.getElementById('welcomeScreen');
        const micBtn = document.getElementById('micBtn');

        globalMenuToggle.addEventListener('click', (e) => {
            e.stopPropagation();
            sidebar.classList.toggle('collapsed');
            document.body.classList.toggle('sidebar-open');
        });

        document.addEventListener('click', (e) => {
            if (window.innerWidth <= 768) {
                if (!sidebar.contains(e.target) && !globalMenuToggle.contains(e.target)) {
                    sidebar.classList.add('collapsed');
                    document.body.classList.remove('sidebar-open');
                }
            }
        });

        plusMenuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            uploadPopupMenu.classList.toggle('show');
        });

        document.addEventListener('click', (e) => {
            if (!uploadPopupMenu.contains(e.target) && !plusMenuBtn.contains(e.target)) {
                uploadPopupMenu.classList.remove('show');
            }
        });

        function triggerUpload(type) {
            uploadPopupMenu.classList.remove('show');
            hideWelcome();
            appendMessage(`System Action: Activated ${type} pipeline.`, 'assistant');
        }

        function selectMenu(category) {
            document.getElementById('dynamicTitle').innerText = `ChatNova AI — ${category}`;
            hideWelcome();
            appendMessage(`Switched contextual canvas to: **${category}** mode.`, 'assistant');

            if (window.innerWidth <= 768) {
                sidebar.classList.add('collapsed');
                document.body.classList.remove('sidebar-open');
            }
        }

        function executeUserSend() {
            const queryText = chatInputField.value.trim();
            if (!queryText) return;

            hideWelcome();
            appendMessage(queryText, 'user');
            chatInputField.value = '';
            simulateAIResponse(queryText);
        }

        function appendMessage(text, sender) {
            const msgBubble = document.createElement('div');
            msgBubble.classList.add('message', sender);
            msgBubble.innerHTML = text;
            chatDisplay.appendChild(msgBubble);
            chatDisplay.scrollTop = chatDisplay.scrollHeight;
        }

        function hideWelcome() {
            if (welcomeScreen) {
                welcomeScreen.style.display = 'none';
            }
        }

        function simulateAIResponse(userPrompt) {
            setTimeout(() => {
                let reply = "I process prompts universally. Tell me how to configure your current stack!";
                if (userPrompt.toLowerCase().includes('hello') || userPrompt.toLowerCase().includes('hi')) {
                    reply = "Hello! ChatNova AI online. Ready to build software, organize calendars, or parse intelligence tracks.";
                } else {
                    reply = `I am processing your text request: "<em>${userPrompt}</em>". Custom workspace triggers are online.`;
                }
                appendMessage(reply, 'assistant');
            }, 750);
        }

        sendMsgBtn.addEventListener('click', executeUserSend);
        chatInputField.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                executeUserSend();
            }
        });

        micBtn.addEventListener('click', () => {
            hideWelcome();
            appendMessage("<em>Listening for audio stream input...</em>", 'assistant');
        });
    </script>
</body>
</html>
