<!DOCTYPE html>
<html>
<head>
<title>ChatNova AI</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#202123;
color:white;
display:flex;
height:100vh;
}

.sidebar{
width:250px;
background:#171717;
padding:20px;
}

.newchat{
background:#343541;
padding:15px;
border-radius:10px;
text-align:center;
font-size:20px;
margin-bottom:20px;
}

.main{
flex:1;
display:flex;
flex-direction:column;
}

.header{
background:#343541;
padding:20px;
text-align:center;
font-size:35px;
font-weight:bold;
}

.chat-area{
flex:1;
padding:20px;
overflow:auto;
}

.ai{
background:#444654;
padding:20px;
border-radius:10px;
font-size:22px;
max-width:800px;
}

.input-area{
background:#343541;
padding:20px;
display:flex;
gap:10px;
}

input{
flex:1;
padding:15px;
font-size:20px;
border:none;
border-radius:10px;
}

button{
padding:15px 25px;
font-size:20px;
border:none;
border-radius:10px;
cursor:pointer;
}
</style>

</head>

<body>

<div class="sidebar">
<div class="newchat">➕ New Chat</div>
<p>Chat 1</p>
<p>Chat 2</p>
<p>Chat 3</p>
</div>

<div class="main">

<div class="header">
🤖 ChatNova AI
</div>

<div class="chat-area">
<div class="ai">
Hello! I am ChatNova AI. How can I help you today?
</div>
</div>

<div class="input-area">
<input type="text" placeholder="Message ChatNova AI...">
<button>Send</button>
</div>

</div>

</body>
</html>
