
<!DOCTYPE html>
<html>
<head>
<title>ChatNova AI</title>

<style>
body{
font-family:Arial,sans-serif;
background:white;
margin:0;
height:100vh;
display:flex;
flex-direction:column;
}

.header{
padding:20px;
text-align:center;
font-size:40px;
font-weight:bold;
}

#chat{
flex:1;
padding:15px;
overflow-y:auto;
}

.bot{
background:#f1f1f1;
padding:15px;
border-radius:15px;
margin:10px;
max-width:80%;
}

.user{
background:#0b93f6;
color:white;
padding:15px;
border-radius:15px;
margin:10px;
margin-left:auto;
max-width:80%;
}

.input-area{
display:flex;
padding:15px;
gap:10px;
border-top:1px solid #ddd;
}

input{
flex:1;
padding:15px;
font-size:20px;
border-radius:25px;
border:1px solid #ccc;
}

button{
padding:15px 25px;
font-size:20px;
background:#0b93f6;
color:white;
border:none;
border-radius:25px;
}

.footer{
text-align:center;
padding:10px;
color:gray;
}
</style>
</head>

<body>

<div class="header">
🤖 ChatNova AI
</div>

<div id="chat">
<div class="bot">
Hello! I am ChatNova AI. How can I help you today?
</div>
</div>

<div class="input-area">
<input type="text" id="msg" placeholder="Ask ChatNova AI...">
<button onclick="sendMessage()">Send</button>
</div>

<div class="footer">
Created by Ayush 🚀
</div>

<script>
function sendMessage(){
let text=document.getElementById("msg").value;

if(text=="") return;

let chat=document.getElementById("chat");

chat.innerHTML += '<div class="user">'+text+'</div>';

document.getElementById("msg").value="";
}
</script>

</body>
</html>
