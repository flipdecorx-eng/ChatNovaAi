<!DOCTYPE html>
<html>
<head>
<title>ChatNova AI</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:white;
height:100vh;
display:flex;
flex-direction:column;
}

.header{
text-align:center;
padding:30px;
font-size:90px;
font-weight:bold;
}

.welcome{
text-align:center;
font-size:50px;
color:gray;
padding:20px;
}

#chat{
flex:1;
padding:20px;
overflow-y:auto;
}

.bot{
background:#f0f0f0;
padding:35px;
border-radius:25px;
font-size:40px;
margin:20px;
}

.user{
background:#2196F3;
color:white;
padding:35px;
border-radius:25px;
font-size:40px;
margin:20px;
margin-left:auto;
max-width:80%;
}

.input-area{
display:flex;
padding:20px;
gap:15px;
border-top:2px solid #ddd;
}

input{
flex:1;
padding:35px;
font-size:40px;
border-radius:50px;
border:2px solid #ccc;
}

button{
padding:35px 50px;
font-size:40px;
border:none;
border-radius:50px;
background:#2196F3;
color:white;
}

.footer{
text-align:center;
font-size:24px;
padding:15px;
color:gray;
}
</style>
</head>

<body>

<div class="header">
🤖 ChatNova AI
</div>

<div class="welcome">
Hello! I am ChatNova AI.<br>
How can I help you today?
</div>

<div id="chat">
<div class="bot">
Hello! I am ChatNova AI. How can I help you today?
</div>
</div>

<div class="input-area">
<input type="text" id="msg" placeholder="Ask ChatNova AI...">
<button onclick="sendMessage()">Send</button>
</div>

<div class="footer">
Created by Ayush 🚀
</div>

<script>
function sendMessage(){
let text=document.getElementById("msg").value;
if(text=="") return;

let chat=document.getElementById("chat");

chat.innerHTML +=
'<div class="user">'+text+'</div>';

document.getElementById("msg").value="";
}
</script>

</body>
</html>
