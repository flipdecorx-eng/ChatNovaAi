<!DOCTYPE html>
<html>
<head>
<title>ChatNova AI</title>

<style>
body{
font-family:Arial,sans-serif;
background:white;
margin:0;
height:100vh;
display:flex;
flex-direction:column;
}

.header{
text-align:center;
font-size:70px;
font-weight:bold;
padding:30px;
}

.welcome{
text-align:center;
font-size:35px;
color:gray;
margin-bottom:20px;
}

#chat{
flex:1;
padding:20px;
overflow-y:auto;
}

.bot{
background:#f1f1f1;
padding:25px;
border-radius:20px;
margin:15px;
font-size:28px;
max-width:85%;
}

.user{
background:#2196F3;
color:white;
padding:25px;
border-radius:20px;
margin:15px;
font-size:28px;
max-width:85%;
margin-left:auto;
}

.input-area{
display:flex;
padding:20px;
gap:15px;
border-top:1px solid #ddd;
}

input{
flex:1;
padding:25px;
font-size:30px;
border-radius:40px;
border:1px solid #ccc;
}

button{
padding:25px 40px;
font-size:30px;
background:#2196F3;
color:white;
border:none;
border-radius:40px;
}

.footer{
text-align:center;
padding:15px;
font-size:22px;
color:gray;
}
</style>
</head>

<body>

<div class="header">
🤖 ChatNova AI
</div>

<div class="welcome">
Hello! I am ChatNova AI.<br>
How can I help you today?
</div>

<div id="chat">
<div class="bot">
Hello! I am ChatNova AI. How can I help you today?
</div>
</div>

<div class="input-area">
<input type="text" id="msg" placeholder="Ask ChatNova AI...">
<button onclick="sendMessage()">Send</button>
</div>

<div class="footer">
Created by Ayush 🚀
</div>

<script>
function sendMessage(){
let text=document.getElementById("msg").value;
if(text=="") return;

let chat=document.getElementById("chat");

chat.innerHTML += '<div class="user">'+text+'</div>';

document.getElementById("msg").value="";
}
</script>

</body>
</html>
